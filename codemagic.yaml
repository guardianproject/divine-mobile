# ABOUTME: Codemagic CI/CD configuration for Divine mobile app builds.
# ABOUTME: Configured for iOS and Android builds with manual triggering only.

# Steps to setup:
# 1 - Create the Codemagic project with access to the repository.
# 2 - Setup iOS publishing:
#   2.1 - https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/#:~:text=Creating%20the%20App%20Store%20Connect%20API%20key
# 3 - Setup Android publishing:
#   3.1 - Code signing: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/#:~:text=Generating%20a%20keystore
#   3.2 - Connect to Google Play: https://docs.codemagic.io/yaml-publishing/google-play/
# 4 - Setup emails to receive build notifications.
# 5 - Create environment variable group "zendesk_credentials" with:
#   - ZENDESK_APP_ID
#   - ZENDESK_CLIENT_ID
#   - ZENDESK_URL
# 6 - DEFAULT_ENV is configured via build inputs (dropdown) when starting a build
#   - Options: PRODUCTION, STAGING, TEST, POC
#   - Defaults to PRODUCTION for automatic builds
# 7 - Create environment variable group "proofmode_credentials" with:
#   - PROOFMODE_SIGNING_SERVER_ENDPOINT
#   - PROOFMODE_SIGNING_SERVER_TOKEN
# 8 - PUBLISH_TO_GITHUB is configured via build inputs (dropdown) when starting builds
#   - Set to YES to upload artifacts to a GitHub Release (for Zapstore / direct distribution)
#   - Defaults to NO
#   - Requires GITHUB_TOKEN in "github_credentials" environment variable group

definitions:
  environment:
    emails: &emails
      - TODO
  scripts:
    - &setup_code_signing_xcode
      name: Set up code signing settings on Xcode project
      script: xcode-project use-profiles
    - &install_flutterfire
      name: Install FlutterFire CLI
      script: dart pub global activate flutterfire_cli
    - &enable_spm
      name: Enable Swift Package Manager
      script: flutter config --enable-swift-package-manager
    - &prepare_ios_spm_packages
      name: Prepare iOS Swift package deployment targets
      script: |
        flutter build ios --config-only

        ruby <<'RUBY'
        files = [
          'ios/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage/Package.swift',
          'ios/Flutter/ephemeral/Packages/.packages/FlutterFramework/Package.swift',
        ]

        files.each do |path|
          contents = File.read(path)
          updated = contents.gsub('.iOS("13.0")', '.iOS("16.0")')

          unless updated.include?('.iOS("16.0")')
            abort("expected #{path} to declare iOS 16.0")
          end

          if updated != contents
            File.write(path, updated)
            puts "patched #{path} to iOS 16.0"
          else
            puts "#{path} already targets iOS 16.0"
          end
        end
        RUBY
    - &flutter_pub_get
      name: Get Flutter dependencies
      script: flutter pub get
    - &pod_install
      name: Run pod install
      script: find . -name "Podfile" -execdir pod install \;
    - &setup_local_properties
      name: Set up local.properties
      script: echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/mobile/android/local.properties"
    - &build_apk
      name: Build Android APK
      script: |
        flutter build apk --release --split-per-abi --build-number=$PROJECT_BUILD_NUMBER \
          --dart-define=ZENDESK_APP_ID=$ZENDESK_APP_ID \
          --dart-define=ZENDESK_CLIENT_ID=$ZENDESK_CLIENT_ID \
          --dart-define=ZENDESK_URL=$ZENDESK_URL \
          --dart-define=DEFAULT_ENV=${{ inputs.DEFAULT_ENV }} \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT=$PROOFMODE_SIGNING_SERVER_ENDPOINT \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN=$PROOFMODE_SIGNING_SERVER_TOKEN
    - &build_aab
      name: Build Android AAB
      script: |
        # Use the latest Play versionCode as the primary source of truth.
        LATEST_GOOGLE_PLAY_BUILD_NUMBER=$(google-play get-latest-build-number --package-name "co.openvine.app" 2>/dev/null || true)
        BUILD_NUMBER=$PROJECT_BUILD_NUMBER
        case "$LATEST_GOOGLE_PLAY_BUILD_NUMBER" in
          ''|*[!0-9]*)
            ;;
          *)
            NEXT_PLAY_BUILD_NUMBER=$((LATEST_GOOGLE_PLAY_BUILD_NUMBER + 1))
            if [ "$NEXT_PLAY_BUILD_NUMBER" -gt "$BUILD_NUMBER" ]; then
              BUILD_NUMBER=$NEXT_PLAY_BUILD_NUMBER
            fi
            ;;
        esac
        flutter build appbundle --release --build-number=$BUILD_NUMBER \
          --dart-define=ZENDESK_APP_ID=$ZENDESK_APP_ID \
          --dart-define=ZENDESK_CLIENT_ID=$ZENDESK_CLIENT_ID \
          --dart-define=ZENDESK_URL=$ZENDESK_URL \
          --dart-define=DEFAULT_ENV=${{ inputs.DEFAULT_ENV }} \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT=$PROOFMODE_SIGNING_SERVER_ENDPOINT \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN=$PROOFMODE_SIGNING_SERVER_TOKEN
    - &build_macos
      name: Build macOS app
      script: |
        # This workflow packages a DMG for direct download. It does not provision
        # a macOS signing identity/profile in Codemagic, so disable signing for
        # the CI build and handle signing/notarization separately when needed.
        env CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO flutter build macos --release \
          --dart-define=ZENDESK_APP_ID=$ZENDESK_APP_ID \
          --dart-define=ZENDESK_CLIENT_ID=$ZENDESK_CLIENT_ID \
          --dart-define=ZENDESK_URL=$ZENDESK_URL \
          --dart-define=DEFAULT_ENV=${{ inputs.DEFAULT_ENV }} \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT=$PROOFMODE_SIGNING_SERVER_ENDPOINT \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN=$PROOFMODE_SIGNING_SERVER_TOKEN
    - &package_macos_dmg
      name: Package macOS DMG
      script: |
        APP_PATH="build/macos/Build/Products/Release"
        APP_NAME=$(ls "$APP_PATH" | grep '\.app$' | head -1)
        DMG_NAME="Divine-macOS.dmg"
        echo "Packaging $APP_NAME as $DMG_NAME"
        hdiutil create -volname "Divine" -srcfolder "$APP_PATH/$APP_NAME" \
          -ov -format UDZO "$APP_PATH/$DMG_NAME"
    - &publish_github_release
      name: Publish to GitHub Release
      script: |
        if [ "${{ inputs.PUBLISH_TO_GITHUB }}" != "YES" ]; then
          echo "Skipping GitHub Release (PUBLISH_TO_GITHUB != YES)"
          exit 0
        fi
        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
        TAG="$VERSION"
        echo "Publishing to GitHub Release $TAG"
        # Collect artifacts that exist for this platform
        ARTIFACTS=()
        # Android APKs
        for f in build/app/outputs/apk/release/*arm64*.apk build/app/outputs/apk/release/*armeabi*.apk; do
          [ -f "$f" ] && ARTIFACTS+=("$f")
        done
        # iOS IPA
        for f in build/ios/ipa/*.ipa; do
          [ -f "$f" ] && ARTIFACTS+=("$f")
        done
        # macOS DMG
        for f in build/macos/Build/Products/Release/*.dmg; do
          [ -f "$f" ] && ARTIFACTS+=("$f")
        done
        if [ ${#ARTIFACTS[@]} -eq 0 ]; then
          echo "No artifacts found to upload"
          exit 1
        fi
        echo "Uploading ${#ARTIFACTS[@]} artifact(s): ${ARTIFACTS[*]}"
        # If release already exists, upload assets to it; otherwise create new
        if gh release view "$TAG" --repo "$CM_REPO_SLUG" > /dev/null 2>&1; then
          echo "Release $TAG exists, uploading assets (replacing existing)"
          gh release upload "$TAG" \
            --repo "$CM_REPO_SLUG" \
            --clobber \
            "${ARTIFACTS[@]}"
        else
          echo "Creating new release $TAG"
          gh release create "$TAG" \
            --repo "$CM_REPO_SLUG" \
            --title "$TAG" \
            --prerelease \
            --generate-notes \
            "${ARTIFACTS[@]}"
        fi
    - &build_ios
      name: Build and sign iOS
      script: |
        # Offset to continue from existing manual builds
        BUILD_NUMBER=$((PROJECT_BUILD_NUMBER + 142))
        flutter build ipa --release --build-number=$BUILD_NUMBER \
          --dart-define=ZENDESK_APP_ID=$ZENDESK_APP_ID \
          --dart-define=ZENDESK_CLIENT_ID=$ZENDESK_CLIENT_ID \
          --dart-define=ZENDESK_URL=$ZENDESK_URL \
          --dart-define=DEFAULT_ENV=${{ inputs.DEFAULT_ENV }} \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT=$PROOFMODE_SIGNING_SERVER_ENDPOINT \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN=$PROOFMODE_SIGNING_SERVER_TOKEN \
          --export-options-plist=/Users/builder/export_options.plist
    - &upload_dsyms_to_crashlytics
      name: Upload dSYMs to Firebase Crashlytics
      script: |
        DSYM_DIR="build/ios/archive/Runner.xcarchive/dSYMs"

        if [ ! -d "$DSYM_DIR" ]; then
          echo "ERROR: dSYM directory not found at $DSYM_DIR"
          find build/ios -name "*.dSYM" -type d 2>/dev/null || true
          exit 1
        fi

        echo "Found dSYMs:"
        ls -la "$DSYM_DIR"

        # Find the Crashlytics upload-symbols tool from the SPM build
        UPLOAD_SYMBOLS=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "upload-symbols" -type f 2>/dev/null | head -1)
        if [ -z "$UPLOAD_SYMBOLS" ]; then
          UPLOAD_SYMBOLS=$(find . -path "*/FirebaseCrashlytics*" -name "upload-symbols" -type f 2>/dev/null | head -1)
        fi

        if [ -z "$UPLOAD_SYMBOLS" ]; then
          echo "ERROR: upload-symbols tool not found. Searching all locations..."
          find "$HOME" -name "upload-symbols" -type f 2>/dev/null || true
          find . -name "upload-symbols" -type f 2>/dev/null || true
          exit 1
        fi

        echo "Found upload-symbols at: $UPLOAD_SYMBOLS"
        chmod +x "$UPLOAD_SYMBOLS"

        "$UPLOAD_SYMBOLS" \
          -gsp ios/Runner/GoogleService-Info.plist \
          -p ios \
          "$DSYM_DIR"
    - &build_ios_simulator
      name: Build iOS Simulator app
      script: |
        flutter build ios --simulator \
          --dart-define=ZENDESK_APP_ID=$ZENDESK_APP_ID \
          --dart-define=ZENDESK_CLIENT_ID=$ZENDESK_CLIENT_ID \
          --dart-define=ZENDESK_URL=$ZENDESK_URL \
          --dart-define=DEFAULT_ENV=${{ inputs.DEFAULT_ENV }} \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT=$PROOFMODE_SIGNING_SERVER_ENDPOINT \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN=$PROOFMODE_SIGNING_SERVER_TOKEN
    - &build_ios_e2e
      name: Build iOS Simulator app
      script: |
        flutter build ios --simulator \
          --dart-define=ZENDESK_APP_ID=$ZENDESK_APP_ID \
          --dart-define=ZENDESK_CLIENT_ID=$ZENDESK_CLIENT_ID \
          --dart-define=ZENDESK_URL=$ZENDESK_URL \
          --dart-define=DEFAULT_ENV=$DEFAULT_ENV \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT=$PROOFMODE_SIGNING_SERVER_ENDPOINT \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN=$PROOFMODE_SIGNING_SERVER_TOKEN
    - &build_android_e2e
      name: Build Android debug APK
      script: |
        flutter build apk --debug \
          --dart-define=ZENDESK_APP_ID=$ZENDESK_APP_ID \
          --dart-define=ZENDESK_CLIENT_ID=$ZENDESK_CLIENT_ID \
          --dart-define=ZENDESK_URL=$ZENDESK_URL \
          --dart-define=DEFAULT_ENV=$DEFAULT_ENV \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT=$PROOFMODE_SIGNING_SERVER_ENDPOINT \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN=$PROOFMODE_SIGNING_SERVER_TOKEN
    - &install_maestro
      name: Install Maestro CLI
      script: |
        set -e
        curl -Ls "https://get.maestro.mobile.dev" | bash
        export PATH="$PATH:$HOME/.maestro/bin"
        maestro --version
    - &run_maestro_smoke_tests
      name: Run Maestro Smoke Tests
      script: |
        set -e
        export PATH="$PATH:$HOME/.maestro/bin"
        maestro test e2e/maestro/suites/smoke.yaml
    - &boot_ios_simulator
      name: Boot iOS Simulator
      script: |
        DEVICE_UDID=$(xcrun simctl list devices available -j | \
          python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for runtime, devices in data['devices'].items():
            for d in devices:
                if d['name'] == 'iPhone 16 Pro' and d['isAvailable']:
                    print(d['udid'])
                    sys.exit(0)
        sys.exit(1)
        ")
        xcrun simctl boot "$DEVICE_UDID" || true
        echo "Booted simulator: $DEVICE_UDID"
    - &install_app_ios_simulator
      name: Install app on iOS Simulator
      script: |
        APP_PATH="build/ios/iphonesimulator/Runner.app"
        DEVICE_UDID=$(xcrun simctl list devices booted -j | \
          python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for runtime, devices in data['devices'].items():
            for d in devices:
                if d['state'] == 'Booted':
                    print(d['udid'])
                    sys.exit(0)
        sys.exit(1)
        ")
        xcrun simctl uninstall "$DEVICE_UDID" "$BUNDLE_ID" 2>/dev/null || true
        xcrun simctl install "$DEVICE_UDID" "$APP_PATH"
        echo "App installed on iOS simulator: $DEVICE_UDID"
    - &launch_android_emulator
      name: Launch Android emulator
      script: |
        set -e
        cd $ANDROID_HOME/tools
        emulator -avd emulator &
        adb wait-for-device
        TIMEOUT=120
        ELAPSED=0
        while [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" != "1" ]; do
          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "ERROR: Android emulator failed to boot within ${TIMEOUT}s"
            exit 1
          fi
          echo "Waiting for Android emulator to boot... (${ELAPSED}s/${TIMEOUT}s)"
          sleep 5
          ELAPSED=$((ELAPSED + 5))
        done
        echo "Android emulator booted"
    - &install_app_android_emulator
      name: Install app on Android emulator
      script: |
        set -e
        APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
        if [ ! -f "$APK_PATH" ]; then
          echo "ERROR: APK not found at $APK_PATH"
          exit 1
        fi
        adb install "$APK_PATH"
        echo "App installed on Android emulator"
    - &validate_ios_qa_env
      name: Validate iOS QA environment
      script: |
        set -eu
        for name in \
          PR_NUMBER PR_HEAD_SHA PR_HEAD_REPO PR_HEAD_REF \
          QA_SLOT QA_BUNDLE_ID QA_EXTENSION_BUNDLE_ID QA_APP_GROUP \
          QA_DISPLAY_NAME QA_FIREBASE_APP_ID DEFAULT_ENV \
          CODEMAGIC_APP_ID IOS_QA_GITHUB_TOKEN QA_FIREBASE_GROUP_ALIAS
        do
          eval "value=\${$name:-}"
          if [ -z "$value" ]; then
            echo "Missing required iOS QA variable: $name"
            exit 1
          fi
        done
        # Make IOS_QA_GITHUB_TOKEN available as GH_TOKEN for gh CLI usage.
        echo "GH_TOKEN=$IOS_QA_GITHUB_TOKEN" >> "$CM_ENV"
    - &verify_ios_qa_head
      name: Verify mirrored PR SHA
      script: |
        set -eu
        ACTUAL_SHA="$(git rev-parse HEAD)"
        if [ "$ACTUAL_SHA" != "$PR_HEAD_SHA" ]; then
          echo "Stale mirror branch: expected $PR_HEAD_SHA, got $ACTUAL_SHA"
          exit 1
        fi
    - &write_firebase_credentials
      name: Write Firebase service-account credentials
      script: |
        set -eu
        if [ -n "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
          : "${GOOGLE_APPLICATION_CREDENTIALS:=$CM_BUILD_DIR/firebase_credentials.json}"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" \
            > "$GOOGLE_APPLICATION_CREDENTIALS"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS" \
            >> "$CM_ENV"
          exit 0
        fi
        if [ -n "${FIREBASE_TOKEN:-}" ]; then
          echo "Using deprecated FIREBASE_TOKEN fallback. Prefer FIREBASE_SERVICE_ACCOUNT."
          exit 0
        fi
        echo "Missing FIREBASE_SERVICE_ACCOUNT or FIREBASE_TOKEN"
        exit 1
    - &configure_ios_qa_slot
      name: Configure iOS QA slot
      script: |
        set -eu
        python3 scripts/ci/configure_ios_qa_slot.py \
          --project-root . \
          --bundle-id "$QA_BUNDLE_ID" \
          --extension-bundle-id "$QA_EXTENSION_BUNDLE_ID" \
          --app-group "$QA_APP_GROUP" \
          --display-name "$QA_DISPLAY_NAME" \
          --firebase-ios-app-id "$QA_FIREBASE_APP_ID"
    - &build_ios_qa
      name: Build iOS QA IPA
      script: |
        set -eu
        flutter build ipa --release --build-number="$PROJECT_BUILD_NUMBER" \
          --dart-define=ZENDESK_APP_ID="$ZENDESK_APP_ID" \
          --dart-define=ZENDESK_CLIENT_ID="$ZENDESK_CLIENT_ID" \
          --dart-define=ZENDESK_URL="$ZENDESK_URL" \
          --dart-define=DEFAULT_ENV="$DEFAULT_ENV" \
          --dart-define=PROOFMODE_SIGNING_SERVER_ENDPOINT="$PROOFMODE_SIGNING_SERVER_ENDPOINT" \
          --dart-define=PROOFMODE_SIGNING_SERVER_TOKEN="$PROOFMODE_SIGNING_SERVER_TOKEN" \
          --dart-define=IOS_BUNDLE_ID="$QA_BUNDLE_ID" \
          --dart-define=PUSH_APP_IDENTIFIER="$QA_BUNDLE_ID" \
          --dart-define=FIREBASE_IOS_APP_ID="$QA_FIREBASE_APP_ID" \
          --export-options-plist=/Users/builder/export_options.plist
    - &verify_ios_qa_pr_current
      name: Verify PR is still current before distribution
      script: |
        set -eu
        pr_json="pr-current.json"
        curl --fail-with-body \
          -H "Authorization: Bearer $IOS_QA_GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$CM_REPO_SLUG/pulls/$PR_NUMBER" \
          > "$pr_json"
        python3 - "$pr_json" <<'PY'
        import json
        import os
        import sys

        with open(sys.argv[1], encoding="utf-8") as fp:
            pr = json.load(fp)
        expected = os.environ["PR_HEAD_SHA"]
        actual = pr["head"]["sha"]
        if pr["state"] != "open" or actual != expected:
            with open(os.environ["CM_ENV"], "a", encoding="utf-8") as env_fp:
                env_fp.write("STALE_IOS_QA_BUILD=true\n")
            print(
                f"Stale PR build: state={pr['state']} expected={expected} "
                f"actual={actual}",
            )
        PY
    - &distribute_ios_qa_firebase
      name: Distribute iOS QA build to Firebase
      script: |
        set -eu
        if [ "${STALE_IOS_QA_BUILD:-}" = "true" ]; then
          echo "Skipping Firebase distribution for stale iOS QA build"
          exit 0
        fi
        npm install -g firebase-tools
        IPA_PATH="$(ls build/ios/ipa/*.ipa | head -1)"
        firebase_token_args=""
        if [ -n "${FIREBASE_TOKEN:-}" ] && [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
          firebase_token_args="--token $FIREBASE_TOKEN"
        fi
        firebase appdistribution:distribute "$IPA_PATH" \
          --app "$QA_FIREBASE_APP_ID" \
          --groups "$QA_FIREBASE_GROUP_ALIAS" \
          --release-notes "PR #$PR_NUMBER $PR_HEAD_SHA ($QA_SLOT)" \
          --json \
          $firebase_token_args \
          > firebase-distribution.json
        python3 ../.github/scripts/ios_qa_slots.py parse-firebase-distribution \
          --json-file firebase-distribution.json \
          --require-testing-uri \
          > firebase-distribution-links.json
    - &notify_ios_qa_github
      name: Notify GitHub about iOS QA build
      script: |
        set -u
        missing_context=""
        for name in IOS_QA_GITHUB_TOKEN CM_REPO_SLUG PR_NUMBER; do
          eval "value=\${$name:-}"
          if [ -z "$value" ]; then
            missing_context="$missing_context $name"
          fi
        done
        if [ -n "$missing_context" ]; then
          echo "Cannot update GitHub for iOS QA build; missing:$missing_context"
          exit 0
        fi
        python3 ../.github/scripts/ios_qa_slots.py resolve-notify-status \
          --firebase-json firebase-distribution.json \
          --firebase-links-json firebase-distribution-links.json \
          --stale-env STALE_IOS_QA_BUILD \
          > ios-qa-notify-state.json
        status="$(python3 - <<'PY'
        import json
        with open("ios-qa-notify-state.json", encoding="utf-8") as fp:
            print(json.load(fp)["status"])
        PY
        )"
        firebase_json="$(python3 - <<'PY'
        import json
        with open("ios-qa-notify-state.json", encoding="utf-8") as fp:
            print(json.load(fp).get("firebase_json") or "")
        PY
        )"
        if [ -n "${CODEMAGIC_APP_ID:-}" ] && [ -n "${CM_BUILD_ID:-}" ]; then
          codemagic_build_url="https://codemagic.io/app/$CODEMAGIC_APP_ID/build/$CM_BUILD_ID"
        else
          codemagic_build_url="Codemagic build URL unavailable"
        fi
        qa_slot="${QA_SLOT:-unknown}"
        pr_head_sha="${PR_HEAD_SHA:-unknown}"
        updated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        if [ -n "$firebase_json" ]; then
          python3 ../.github/scripts/ios_qa_slots.py render-comment \
            --status "$status" \
            --pr-number "$PR_NUMBER" \
            --slot "$qa_slot" \
            --sha "$pr_head_sha" \
            --codemagic-build-id "${CM_BUILD_ID:-}" \
            --codemagic-build-url "$codemagic_build_url" \
            --firebase-json "$firebase_json" \
            --updated-at "$updated_at" \
            > ios-qa-comment.md
        else
          python3 ../.github/scripts/ios_qa_slots.py render-comment \
            --status "$status" \
            --pr-number "$PR_NUMBER" \
            --slot "$qa_slot" \
            --sha "$pr_head_sha" \
            --codemagic-build-id "${CM_BUILD_ID:-}" \
            --codemagic-build-url "$codemagic_build_url" \
            --updated-at "$updated_at" \
            > ios-qa-comment.md
        fi
        python3 ../.github/scripts/ios_qa_slots.py notify-github \
          --repo "$CM_REPO_SLUG" \
          --issue-number "$PR_NUMBER" \
          --token-env IOS_QA_GITHUB_TOKEN \
          --status "$status" \
          --body-file ios-qa-comment.md
workflows:
  ios-build:
    name: iOS Build
    working_directory: mobile
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: API key for Codemagic # Setup in Codemagic UI
    inputs:
      DEFAULT_ENV:
        description: Default environment for fresh app installs
        type: choice
        default: PRODUCTION
        options:
          - PRODUCTION
          - STAGING
          - TEST
          - POC
      PUBLISH_TO_GITHUB:
        description: Upload IPA to GitHub Release (for direct distribution)
        type: choice
        default: "NO"
        options:
          - "NO"
          - "YES"
    environment:
      flutter: 3.41.1
      xcode: latest
      cocoapods: default
      groups:
        - zendesk_credentials
        - proofmode_credentials
        - github_credentials
      vars:
        BUNDLE_ID: co.openvine.app
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.openvine.app
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.pub-cache
    triggering:
      events: []
    scripts:
      - *setup_code_signing_xcode
      - *install_flutterfire
      - *enable_spm
      - *prepare_ios_spm_packages
      - *pod_install
      - *build_ios
      - *upload_dsyms_to_crashlytics
      - *publish_github_release
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/dSYMs/**
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
        # Auto-distribute internal builds to the existing internal TestFlight groups.
        beta_groups:
          - "AOS"
          - "GW"
          - "rabblelabs"
          - "RL Devs"
          - "VGV"


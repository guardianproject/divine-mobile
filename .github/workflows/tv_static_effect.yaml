# ABOUTME: CI workflow for the tv_static_effect package.
# ABOUTME: Runs tests, formatting, and analysis only when tv_static_effect files change.

name: TV-Static-Effect CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/tv_static_effect/**"
      - ".github/workflows/tv_static_effect.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/tv_static_effect/**"
      - ".github/workflows/tv_static_effect.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/tv_static_effect"

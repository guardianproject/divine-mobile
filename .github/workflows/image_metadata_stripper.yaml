# ABOUTME: CI workflow for the image_metadata_stripper package.
# ABOUTME: Runs tests, formatting, and analysis only when image_metadata_stripper files change.

name: Image-Metadata-Stripper CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/image_metadata_stripper/**"
      - ".github/workflows/image_metadata_stripper.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/image_metadata_stripper/**"
      - ".github/workflows/image_metadata_stripper.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/image_metadata_stripper"

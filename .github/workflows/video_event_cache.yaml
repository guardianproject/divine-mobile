# ABOUTME: CI workflow for the video_event_cache package.
# ABOUTME: Runs tests, formatting, and analysis only when video_event_cache files change.

name: Video Event Cache CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/video_event_cache/**"
      - ".github/workflows/video_event_cache.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/video_event_cache/**"
      - ".github/workflows/video_event_cache.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/video_event_cache"
      min_coverage: 0

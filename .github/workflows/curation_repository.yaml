# ABOUTME: CI workflow for the curation_repository package.
# ABOUTME: Runs tests, formatting, and analysis only when curation_repository files change.

name: Curation Repository CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/curation_repository/**"
      - ".github/workflows/curation_repository.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/curation_repository/**"
      - ".github/workflows/curation_repository.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/curation_repository"

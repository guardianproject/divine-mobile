# ABOUTME: CI workflow for the curation_service package.
# ABOUTME: Runs tests, formatting, and analysis only when curation_service files change.

name: Curation Service CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/curation_service/**"
      - ".github/workflows/curation_service.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/curation_service/**"
      - ".github/workflows/curation_service.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/curation_service"

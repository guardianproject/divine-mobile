# ABOUTME: CI workflow for the categories_repository package.
# ABOUTME: Runs tests, formatting, and analysis only when categories_repository files change.

name: Categories Repository CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/categories_repository/**"
      - ".github/workflows/categories_repository.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/categories_repository/**"
      - ".github/workflows/categories_repository.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/categories_repository"

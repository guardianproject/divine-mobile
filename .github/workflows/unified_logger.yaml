# ABOUTME: CI workflow for the unified_logger package.
# ABOUTME: Runs tests, formatting, and analysis only when unified_logger files change.

name: Unified Logger CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/unified_logger/**"
      - ".github/workflows/unified_logger.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/unified_logger/**"
      - ".github/workflows/unified_logger.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/unified_logger"
      min_coverage: 40

# ABOUTME: CI workflow for the content_blocklist_repository package.
# ABOUTME: Runs tests, formatting, and analysis only when content_blocklist_repository files change.

name: Content Blocklist Repository CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/content_blocklist_repository/**"
      - ".github/workflows/content_blocklist_repository.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/content_blocklist_repository/**"
      - ".github/workflows/content_blocklist_repository.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/content_blocklist_repository"

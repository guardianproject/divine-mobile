name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-files:
    name: Generated Files
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: 🔨 Verify generated files are up-to-date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠️ Generated files are out of date. Please run 'dart run build_runner build' and commit the changes."
            git diff --name-only
            exit 1
          fi
      - name: 🌐 Verify l10n generated files
        run: |
          flutter gen-l10n
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠️ L10n generated files are out of date. Please run 'flutter gen-l10n' and commit the changes."
            git diff --name-only
            exit 1
          fi
  format:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: ✨ Check formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: 🕵️ Analyze code
        run: flutter analyze lib test integration_test
  tests:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: 🛠️ Install Very Good CLI
        run: dart pub global activate very_good_cli
      - name: 🚀 Run Flutter tests
        # concurrency=2 is a compromise: the merged runner runs alongside
        # one tagged file at a time, keeping most of the parallel speedup
        # while halving the chance of singleton/DB races between tagged
        # files (e.g. AppDatabase "database is locked", path_provider
        # pollution). concurrency=1 worked but pushed the job past 1 hour
        # because each tagged file pays a full Dart VM startup cost.
        run: very_good test --optimization --concurrency=2 --exclude-tags integration --test-randomize-ordering-seed random
  mobile-ci:
    name: Mobile CI
    if: ${{ always() }}
    needs:
      - generated-files
      - format
      - analyze
      - tests
    runs-on: ubuntu-latest
    steps:
      - name: Verify upstream jobs
        env:
          GENERATED_FILES_RESULT: ${{ needs.generated-files.result }}
          FORMAT_RESULT: ${{ needs.format.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
        run: |
          echo "generated-files: ${GENERATED_FILES_RESULT}"
          echo "format: ${FORMAT_RESULT}"
          echo "analyze: ${ANALYZE_RESULT}"
          echo "tests: ${TESTS_RESULT}"

          if [[ "${GENERATED_FILES_RESULT}" != "success" || \
                "${FORMAT_RESULT}" != "success" || \
                "${ANALYZE_RESULT}" != "success" || \
                "${TESTS_RESULT}" != "success" ]]; then
            echo "One or more Mobile CI jobs failed."
            exit 1
          fi

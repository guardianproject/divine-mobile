# ABOUTME: CI workflow for the time_formatter package.
# ABOUTME: Runs tests, formatting, and analysis only when time_formatter files change.

name: Time Formatter CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/time_formatter/**"
      - ".github/workflows/time_formatter.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/time_formatter/**"
      - ".github/workflows/time_formatter.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/time_formatter"
      min_coverage: 100

server {
    listen 3000;

    location /v1/client-config {
        default_type application/json;
        return 200 '{"onboardingMode":"open","inviteCodeRequired":false,"waitlistEnabled":false,"supportEmail":"test@divine.video"}';
    }

    location / {
        default_type application/json;
        return 404 '{"error":"not found"}';
    }
}

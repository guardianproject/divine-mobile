name: content_blocklist_repository
description: >
  Repository for managing content blocklists (blocked users, mutual mutes,
  block-list sync to Nostr kind 30000).
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ^3.41.1

dependencies:
  flutter:
    sdk: flutter
  content_policy:
  models:
    path: ../models
  nostr_client:
    path: ../nostr_client
  nostr_sdk:
    path: ../nostr_sdk
  shared_preferences: ^2.5.3
  unified_logger:
    path: ../unified_logger

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

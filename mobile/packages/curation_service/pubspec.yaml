name: curation_service
description: >-
  Service for managing NIP-51 video curation sets and content discovery.
  Handles fetching, caching, and filtering videos based on curation sets.
version: 0.1.0+1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.3.0
  likes_repository:
    path: ../likes_repository
  models:
    path: ../models
  nostr_client:
    path: ../nostr_client
  nostr_sdk:
    path: ../nostr_sdk
  unified_logger:
    path: ../unified_logger
  video_event_cache:
    path: ../video_event_cache

dev_dependencies:
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  test: any
  very_good_analysis: ^10.2.0
